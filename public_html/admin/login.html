<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل مدیریت ربات</title>
    <link rel="stylesheet" href="css/style.css">
    <base href="/admin/">
</head>
<body class="login-body">
    <div class="login-card">
        <h1>🤖 ربات تلگرام</h1>
        <p>سیستم مدیریت پیشرفته</p>
        <form id="login-form">
            <div class="form-group">
                <input type="text" id="token-input" placeholder="توکن Bearer را وارد کنید" autocomplete="off">
                <small style="color: var(--text-dim); display: block; margin-top: 6px; font-size: 12px;">
                    🔐 از توکن API که در setup.php نمایش داده شده استفاده کنید
                </small>
            </div>
            <div id="login-error" class="error-message" style="display: none;"></div>
            <button type="submit" class="btn btn-primary btn-block">🔐 ورود به پنل</button>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
